name: Nightly What 2 Watch pipeline

on:
  schedule:
    # 09:30 UTC = 10:30 BST (summer) / 09:30 GMT (winter)
    # Runs after overnight BARB data lands (~10:00 BST)
    - cron: '30 9 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly pipeline
        env:
          OVERNIGHTS_API_TOKEN: ${{ secrets.OVERNIGHTS_API_TOKEN }}
          OVERNIGHTS_PROGRAMME_TOKEN: ${{ secrets.OVERNIGHTS_PROGRAMME_TOKEN }}
          OVERNIGHTS_BASE_URL: https://api.on-tv.tech/api
          PA_TV_API_KEY: ${{ secrets.PA_TV_API_KEY }}
          PA_TV_BASE_URL: https://tv.api.pressassociation.io/v2
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          SEND_TO_EMAIL: ${{ secrets.SEND_TO_EMAIL }}
          SUBSCRIBERS_API_URL: ${{ secrets.SUBSCRIBERS_API_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          cd src
          python -m overnight.pipeline
